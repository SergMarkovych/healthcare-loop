name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t healthcare-loop .
      - name: Smoke test (offline)
        run: |
          docker run -d --name hc -p 8000:8000 healthcare-loop
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8000/api/health && break; sleep 1; done
          curl -sf http://127.0.0.1:8000/board > /dev/null
          curl -sf -X POST http://127.0.0.1:8000/api/fhir/reset > /dev/null
          docker rm -f hc
