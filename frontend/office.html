<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Digital Office Assistant — Loop</title>
<style>
  :root{
    --bg:#F6F8FB; --surface:#FFFFFF; --surface-2:#F2F5F9;
    --ink:#0E1726; --ink-2:#0A0F1A; --muted:#566173; --faint:#697283;
    --hair:#E4E9F0; --hair-2:#EDF1F6;
    --teal:#0C7E61; --teal-2:#0B6E55; --teal-bg:#E4F4EE;
    --amber:#A84A07; --amber-bg:#FBEFDD;
    --rose:#B42318; --rose-bg:#FBE9E7;
    --slate:#3E5C8A; --slate-bg:#E9EEF7;
    --focus:#2563EB;
    --shadow:0 1px 2px rgba(13,23,42,.04), 0 1px 3px rgba(13,23,42,.05);
    --shadow-lg:0 6px 16px rgba(13,23,42,.08), 0 2px 5px rgba(13,23,42,.05);
    --sans:'Inter',ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    --mono:ui-monospace,'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
    --r-sm:8px; --r-md:12px; --r-lg:16px;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--sans); color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; line-height:1.5; font-size:14px; letter-spacing:-.005em}

  header{position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:14px 24px; background:rgba(246,248,251,.82); backdrop-filter:blur(10px) saturate(1.4); border-bottom:1px solid var(--hair)}
  .brand{margin-right:auto; display:flex; align-items:center; gap:12px; min-width:0}
  .mark{width:30px; height:30px; border-radius:9px; flex:0 0 auto; display:grid; place-items:center;
    background:linear-gradient(150deg,var(--teal),var(--teal-2)); color:#fff; font-weight:800; font-size:15px; box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.25)}
  .brand .txt{min-width:0}
  .wordmark{font-size:15.5px; font-weight:680; letter-spacing:-.02em; color:var(--ink-2); line-height:1.2}
  .sub{font-size:12.5px; color:var(--muted); line-height:1.3}
  .chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:550; padding:5px 11px;
    border-radius:999px; border:1px solid var(--hair); background:var(--surface); color:var(--muted); white-space:nowrap}
  .chip svg{color:var(--teal)}
  .toolnav{display:flex; align-items:center; gap:4px}
  .toolnav a{display:inline-flex; align-items:center; font-size:12.5px; font-weight:550; text-decoration:none; color:var(--muted);
    padding:5px 11px; border-radius:999px; border:1px solid transparent; white-space:nowrap; transition:background .12s, color .12s, border-color .12s}
  .toolnav a:hover{color:var(--ink); background:var(--surface-2)}
  .toolnav a[aria-current="page"]{color:var(--teal-2); background:var(--teal-bg); border-color:#BFE6D8; font-weight:600}

  main{max-width:1200px; margin:0 auto; padding:24px 24px 72px}
  .wrap{max-width:900px; margin:0 auto}

  /* step rail */
  .rail{display:flex; align-items:center; margin:4px 0 6px; overflow-x:auto; padding-bottom:4px}
  .step{display:flex; align-items:center; gap:8px; flex:0 0 auto}
  .step .node{width:24px; height:24px; border-radius:50%; display:grid; place-items:center; font-size:12px; font-weight:700;
    background:var(--surface); border:1.5px solid var(--hair); color:var(--faint)}
  .step.active .node{background:var(--teal); border-color:var(--teal); color:#fff; box-shadow:0 0 0 4px var(--teal-bg)}
  .step.done .node{background:var(--teal-bg); border-color:var(--teal); color:var(--teal-2)}
  .step .lbl{font-size:12px; font-weight:600; color:var(--faint); white-space:nowrap}
  .step.active .lbl{color:var(--ink)}
  .step.done .lbl{color:var(--teal-2)}
  .connector{width:30px; height:2px; background:var(--hair); margin:0 8px; flex:0 0 auto}
  @media(max-width:720px){ .step .lbl{display:none} .connector{width:16px; margin:0 5px} }
  .caption{font-size:13px; color:var(--muted); margin:2px 0 18px}

  .stagepanel{background:var(--surface); border:1px solid var(--hair); border-radius:var(--r-lg); padding:20px 22px; box-shadow:var(--shadow); margin-bottom:16px}
  .stagepanel h2{margin:0 0 4px; font-size:16px; font-weight:680; letter-spacing:-.01em}
  .stagepanel .lead{font-size:13px; color:var(--muted); margin:0 0 16px}
  .grouplabel{font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); margin:18px 0 9px}

  .primary-row{margin-top:18px}
  .btn{appearance:none; border:1px solid var(--teal-2); background:linear-gradient(180deg,var(--teal),var(--teal-2)); color:#fff;
    font-size:13px; font-weight:600; padding:9px 15px; border-radius:var(--r-sm); box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.2); transition:filter .12s, transform .04s; cursor:pointer; font-family:inherit}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:translateY(.5px)}
  .btn[disabled]{opacity:.5; cursor:default; filter:none}
  .btn.lg{font-size:14px; padding:12px 18px; width:100%; display:flex; justify-content:center}

  .req{border:1px solid var(--hair); border-left:3px solid var(--hair); border-radius:var(--r-md); padding:12px 14px; margin-bottom:10px; background:var(--surface); box-shadow:var(--shadow)}
  .req.r-eliminate,.req.r-automate{border-left-color:var(--teal)}
  .req.r-physician_review{border-left-color:var(--amber)}
  .req.r-delegate{border-left-color:var(--slate)}
  .req.resolved{opacity:.9}
  .req-top{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  .req-title{font-weight:620; font-size:14px; letter-spacing:-.01em}
  .route{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:.02em}
  .route::before{content:""; width:6px; height:6px; border-radius:50%; background:currentColor; flex:0 0 auto}
  .route.eliminate,.route.automate{color:var(--teal); background:var(--teal-bg)}
  .route.physician_review{color:var(--amber); background:var(--amber-bg); border:1px solid rgba(168,74,7,.25)}
  .route.delegate{color:var(--slate); background:var(--slate-bg)}
  .req-reason{font-size:12.5px; color:var(--muted); margin:7px 0 0}
  .req-meta{display:flex; align-items:center; gap:14px; margin-top:9px; font-size:12px; color:var(--faint); flex-wrap:wrap}
  .req-meta b{color:var(--ink); font-weight:600}
  .resolved-line{margin-top:9px; font-size:12.5px; color:var(--teal-2); display:flex; gap:7px; align-items:flex-start}
  .resolved-line svg{flex:0 0 auto; margin-top:1px}

  .clearedrow{display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--teal-bg); border:1px solid #BFE6D8; border-radius:var(--r-md); font-size:12.5px; font-weight:600; color:var(--teal-2); margin-bottom:16px}

  .counter{font-size:12.5px; color:var(--muted); margin-bottom:12px}
  .counter b{color:var(--amber)} .counter.alldone b{color:var(--teal)}

  .field{border:1px solid var(--hair); border-radius:var(--r-md); padding:11px 13px; margin-bottom:10px; background:var(--surface)}
  .field.md{border-left:3px solid var(--amber); background:var(--amber-bg)}
  .field.auto{border-left:3px solid var(--teal)}
  .field label{display:block; font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); margin-bottom:6px}
  .field input,.field textarea{width:100%; font-family:inherit; font-size:13.5px; color:var(--ink); border:1px solid var(--hair); border-radius:var(--r-sm); padding:8px 10px; background:var(--surface)}
  .field input:focus,.field textarea:focus{outline:none; border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-bg)}
  .field textarea{resize:vertical; min-height:42px; line-height:1.4}
  .field .prov{display:flex; align-items:center; gap:8px; margin-top:8px; font-size:11px; color:var(--muted); flex-wrap:wrap}
  .conf{font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:999px; border:1px solid var(--hair); color:var(--muted); background:var(--surface-2)}
  .conf.low{color:var(--amber); background:var(--amber-bg); border-color:rgba(168,74,7,.25)}
  .ev{font-family:var(--mono); font-size:10.5px; color:var(--muted); background:var(--surface-2); border:1px solid var(--hair); border-radius:6px; padding:3px 8px; letter-spacing:-.01em}
  .md-hint{font-size:11px; color:var(--amber); font-weight:600}
  .draft-badge{color:var(--teal-2); background:var(--teal-bg); border-color:#BFE6D8}
  .field.drafted{box-shadow:inset 0 2px 0 var(--teal)}

  details.fold{margin:12px 0; border:1px solid var(--hair); border-radius:var(--r-md); background:var(--surface-2)}
  details.fold>summary{cursor:pointer; padding:11px 14px; font-size:12.5px; font-weight:600; color:var(--muted); list-style:none}
  details.fold>summary::-webkit-details-marker{display:none}
  details.fold>summary::before{content:"▸ "; color:var(--faint)}
  details.fold[open]>summary::before{content:"▾ "}
  details.fold[open]>summary{border-bottom:1px solid var(--hair)}
  details.fold .field{margin:10px 14px}
  details.fold pre{margin:0; padding:12px; font-family:var(--mono); font-size:11.5px; white-space:pre-wrap; color:var(--ink)}

  .result{margin-top:14px; border:1px solid var(--amber); background:var(--amber-bg); border-radius:var(--r-md); padding:13px}
  .result .rt{font-weight:600; font-size:13px; color:var(--amber); display:flex; align-items:center; gap:7px}

  .metrics{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:6px 0 18px}
  @media(max-width:760px){.metrics{grid-template-columns:repeat(2,1fr)}}
  .metric{background:var(--surface-2); border:1px solid var(--hair); border-radius:var(--r-md); padding:14px 16px}
  .metric .num{font-size:clamp(22px,4vw,30px); font-weight:720; letter-spacing:-.02em; color:var(--ink-2); font-variant-numeric:tabular-nums}
  .metric.accent .num{color:var(--teal)}
  .metric .lbl{font-size:12px; color:var(--muted); margin-top:3px}

  .payoff-head{font-size:21px; font-weight:720; letter-spacing:-.02em; color:var(--ink-2); margin-bottom:4px}
  .ledger{margin:4px 0 16px}
  .led-item{display:flex; gap:11px; padding:12px 0; border-top:1px solid var(--hair-2); align-items:flex-start}
  .led-item:first-child{border-top:0}
  .led-ico{width:28px; height:28px; border-radius:8px; display:grid; place-items:center; flex:0 0 auto; background:var(--teal-bg); color:var(--teal-2); font-size:14px}
  .led-body{flex:1; min-width:0}
  .led-title{font-weight:600; font-size:13.5px}
  .led-sub{font-size:12px; color:var(--muted); margin-top:2px}
  .payoff-foot{font-size:12.5px; color:var(--muted); margin-top:14px; padding-top:14px; border-top:1px solid var(--hair-2)}

  .empty{border:1px dashed var(--hair); border-radius:var(--r-md); padding:30px 22px; text-align:center; color:var(--muted); font-size:13px}

  .ref-intel-card { background:#f0f7f4; border:1px solid #b2d8c8; border-radius:8px; padding:14px 16px; margin-bottom:18px; }
  .ref-intel-header { display:flex; align-items:baseline; gap:10px; margin-bottom:10px; }
  .ref-intel-title { font-weight:700; font-size:1rem; color:#1a5c3a; }
  .ref-intel-sub { font-size:0.82rem; color:#555; }
  .ref-table { width:100%; border-collapse:collapse; font-size:0.87rem; }
  .ref-table th { text-align:left; padding:5px 8px; border-bottom:2px solid #b2d8c8; color:#444; font-weight:600; }
  .ref-table td { padding:6px 8px; border-bottom:1px solid #dce8e2; }
  .ref-row { cursor:pointer; }
  .ref-row:hover { background:#e2f2ec; }
  .ref-row.selected { background:#c8ead8; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.78rem; font-weight:600; }
  .badge-green { background:#d4edda; color:#155724; }
  .badge-amber { background:#fff3cd; color:#856404; }
  .badge-red { background:#f8d7da; color:#721c24; }

  .differentiation-bar { border-left:3px solid #4a90d9; background:#eef4fb; color:#1a3a5c; font-size:0.84rem; padding:8px 12px; border-radius:0 6px 6px 0; margin-bottom:14px; }

  .vs-comparison { margin-top:20px; border:1px solid #d0d7de; border-radius:8px; padding:14px 16px; background:#fafafa; }
  .vs-title { font-weight:700; font-size:0.93rem; margin-bottom:10px; color:#333; }
  .vs-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  .vs-table th { background:#f0f0f0; padding:6px 10px; text-align:left; border:1px solid #d0d7de; }
  .vs-table td { padding:8px 10px; border:1px solid #d0d7de; vertical-align:top; }
  .vs-table tr td:last-child { color:#1a5c3a; }
  :focus-visible{outline:2px solid var(--focus); outline-offset:2px; border-radius:3px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  .demo-ctx{background:#fff8e1;border-left:4px solid #f5a623;padding:10px 16px;font-size:13px;color:#7a5800;font-weight:500;display:flex;align-items:center;gap:8px}
  .demo-ctx-label{font-weight:700}
  .demo-next{margin-top:24px;padding:14px 18px;background:#e7f4ef;border:1px solid #BFE6D8;border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .demo-next-text{font-size:14px;color:#1a5c3a;font-weight:500}
  .demo-next-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#0E8A6B;color:#fff;text-decoration:none;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap}
  .demo-next-link:hover{background:#0a7059}

  .provider-toggle{display:inline-flex; align-items:center; border:1px solid var(--hair); border-radius:999px; overflow:hidden; background:var(--surface)}
  .ptbtn{appearance:none; border:none; border-right:1px solid var(--hair); background:transparent; color:var(--muted); font-size:12px; font-weight:550; padding:5px 13px; cursor:pointer; transition:background .12s,color .12s; font-family:inherit; white-space:nowrap; line-height:1}
  .ptbtn:last-child{border-right:none}
  .ptbtn.active{background:var(--teal); color:#fff; font-weight:640}
  .ptbtn:hover:not(.active){background:var(--surface-2); color:var(--ink)}
  .pstatus{display:inline-flex; align-items:center; font-size:11.5px; font-weight:600; padding:4px 11px; border-radius:999px; border:1px solid; white-space:nowrap; transition:opacity .15s}
  .pstatus.hidden{display:none}
  .pstatus.checking{color:var(--muted); border-color:var(--hair); background:var(--surface-2)}
  .pstatus.ok{color:var(--teal-2); border-color:#BFE6D8; background:var(--teal-bg)}
  .pstatus.fail{color:var(--amber); border-color:rgba(168,74,7,.25); background:var(--amber-bg)}
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="mark">L</span>
    <span class="txt">
      <span class="wordmark">Digital Office Assistant</span>
      <span class="sub">A guided pass through your paperwork — most of it never reaches you</span>
    </span>
  </div>
  <nav class="toolnav" aria-label="Tools">
    <a href="/">Follow-up extractor</a>
    <a href="/board">Context Board</a>
    <a href="/office" aria-current="page">Office Assistant</a>
  </nav>
  <div class="provider-toggle" id="providerToggle" aria-label="LLM provider">
    <button class="ptbtn" data-p="mock" onclick="setProvider('mock')">Mock</button>
    <button class="ptbtn" data-p="ollama" onclick="setProvider('ollama')">Ollama</button>
    <button class="ptbtn" data-p="openrouter" onclick="setProvider('openrouter')">OpenRouter</button>
  </div>
  <span id="providerStatus" class="pstatus hidden"></span>
  <span id="privacyChip" class="chip" title="Synthetic data only · no PHI leaves this device">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
    Synthetic · no PHI
  </span>
</header>

<main><div class="wrap">
  <div class="rail" id="rail"></div>
  <div class="caption" id="caption"></div>
  <div id="stage"></div>
</div></main>

<script>
"use strict";
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
const CHECK='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>';
// On a wizard step change, move focus to the new heading so keyboard/screen-reader
// users land on the new content instead of being stranded on a removed element.
function focusHeading(){ const h=$("stage").querySelector("h2,.payoff-head"); if(h){ h.setAttribute("tabindex","-1"); h.focus({preventScroll:true}); } }

let QUEUE=[], AUTO=[], PHYS=[], STEP=1, CURSOR=0;
const processed={};      // id -> {category, route}
const artifacts=[];      // ledger entries
let currentReq=null;

const STEPS=[["Triage"],["Your desk"],["Review"],["Approve"],["Done"]];
const CAPTIONS={
  1:"The necessity gate sorted your inbox. Most of it never needed you.",
  2:"These need your clinical judgement. Everything safe is already filled in.",
  3:"Add your clinical judgement — the chart-derived fields are already done.",
  4:"This is the part only a physician can sign.",
  5:"Here's what the assistant produced — and what it kept off your desk."
};
const ROUTE_LABEL={eliminate:"Eliminate",delegate:"Delegate",automate:"Automate",physician_review:"Physician review"};

function applyProvider(p){
  document.querySelectorAll(".ptbtn").forEach(b=>b.classList.toggle("active",b.dataset.p===p));
  const pc=$("privacyChip");
  if(pc) pc.title=p==="openrouter"?"Synthetic data · sent to OpenRouter API · no real PHI":"Synthetic data only · no PHI leaves this device";
}
async function probeProvider(p){
  const ps=$("providerStatus");
  if(!ps) return;
  if(p==="mock"){ps.className="pstatus hidden";return;}
  ps.textContent="checking…"; ps.className="pstatus checking";
  try{
    const r=await (await fetch("/api/probe")).json();
    ps.textContent=r.ok?"● connected":"● unreachable";
    ps.className="pstatus "+(r.ok?"ok":"fail");
  }catch(e){ps.textContent="● unreachable"; ps.className="pstatus fail";}
}
async function setProvider(p){
  try{ await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({provider:p})}); }catch(e){}
  applyProvider(p);
  probeProvider(p);
}

(async function init(){
  try{ const h=await (await fetch("/api/health")).json(); const p=h.force_mock?"mock":h.provider; applyProvider(p); probeProvider(p); }catch(e){}
  try{ QUEUE=await (await fetch("/api/office/requests")).json(); }catch(e){ QUEUE=[]; }
  AUTO=QUEUE.filter(r=>r.route!=="physician_review");
  PHYS=QUEUE.filter(r=>r.route==="physician_review");
  go(1);
})();

function renderRail(){
  const sub=(STEP===3||STEP===4)&&PHYS.length>1?` · ${CURSOR+1} of ${PHYS.length}`:"";
  $("rail").innerHTML=STEPS.map((s,i)=>{
    const n=i+1, cls=n<STEP?"done":(n===STEP?"active":"");
    return `<div class="step ${cls}"><span class="node">${n<STEP?"✓":n}</span><span class="lbl">${esc(s[0])}${n===STEP?sub:""}</span></div>`
      + (i<STEPS.length-1?`<span class="connector"></span>`:"");
  }).join("");
  $("caption").textContent=CAPTIONS[STEP]||"";
}
function go(step){ STEP=step; renderRail();
  if(step===1) renderTriage(); else if(step===2) renderDesk(); else if(step===3) renderReview(); else if(step===5) renderPayoff();
}
function routePill(r,txt){ return `<span class="route ${(r==="eliminate"||r==="automate")?r:r}">${esc(txt||ROUTE_LABEL[r])}</span>`; }
function reqCard(req, tail){
  const m=req.metrics;
  return `<div class="req r-${req.route}" data-id="${esc(req.id)}">
    <div class="req-top"><span class="req-title">${esc(req.title)}</span> ${routePill(req.route)}</div>
    <p class="req-reason">${esc(req.reason)}</p>
    <div class="req-meta"><span>Handled by <b>${esc(req.who)}</b></span><span>Saves <b>${m.saved_minutes} min</b></span></div>
    ${tail||""}
  </div>`;
}

// STEP 1
function renderTriage(){
  $("stage").innerHTML=`<div class="stagepanel">
    <h2>Triage the inbox</h2>
    <div class="differentiation-bar">
      The inbox manager routes and labels documents. Loop acts on them — generates the referral, pre-fills the form, queues the follow-up.
    </div>
    <p class="lead">${QUEUE.length} requests came in. The necessity gate already decided which ones need a physician.</p>
    <div class="grouplabel">Handled without you — ${AUTO.length}</div>
    <div id="autoGroup">${AUTO.map(r=>reqCard(r)).join("")}</div>
    <div class="grouplabel">Needs your clinical judgement — ${PHYS.length}</div>
    <div id="physGroup">${PHYS.map(r=>reqCard(r)).join("")}</div>
    <div class="primary-row"><button class="btn lg" id="clearBtn">Clear the ${AUTO.length} automatic item${AUTO.length===1?"":"s"} →</button></div>
  </div>`;
  $("clearBtn").addEventListener("click", clearAutomatic);
}
function autoBody(req){
  if(req.route==="eliminate") return "Patient attestation issued — no physician certification required.";
  if(req.route==="automate") return `${req.title} generated and queued for signature.`;
  return `Routed to ${req.who}.`;
}
function autoPill(req){ return req.route==="eliminate"?"✓ Issued":req.route==="automate"?"✓ Generated":"✓ Routed"; }
async function clearAutomatic(){
  const btn=$("clearBtn"); btn.disabled=true; btn.textContent="Clearing…";
  for(const req of AUTO){
    processed[req.id]={category:req.category,route:req.route};
    artifacts.push({kind:"auto", title:`${req.title}`, sub:autoBody(req)});
    const card=$("autoGroup").querySelector(`.req[data-id="${CSS.escape(req.id)}"]`);
    if(card){
      card.classList.add("resolved");
      const pill=card.querySelector(".route"); if(pill) pill.outerHTML=`<span class="route eliminate">${esc(autoPill(req))}</span>`;
      const meta=card.querySelector(".req-meta");
      if(meta) meta.insertAdjacentHTML("afterend", `<div class="resolved-line">${CHECK}${esc(autoBody(req))}</div>`);
    }
    await sleep(260);
  }
  btn.disabled=false; btn.textContent=(PHYS.length?"Continue →":"See what you saved →");
  btn.replaceWith(btn.cloneNode(true)); // drop old listener
  $("clearBtn").addEventListener("click", ()=>go(PHYS.length?2:5));
}

// STEP 2
function renderDesk(){
  if(PHYS.length===0) return go(5);
  const autoMin=AUTO.reduce((a,r)=>a+r.metrics.saved_minutes,0);
  $("stage").innerHTML=`<div class="stagepanel">
    <div class="clearedrow">${CHECK}${AUTO.length} item${AUTO.length===1?"":"s"} handled automatically — ${autoMin} min saved</div>
    <h2>${PHYS.length} form${PHYS.length===1?"":"s"} need your clinical input</h2>
    <p class="lead">Everything safe is already filled in from the chart. You only add the clinical judgement.</p>
    <div>${PHYS.map(r=>reqCard(r, processed[r.id]
        ? `<div class="resolved-line">${CHECK}Approved — draft + task created</div>`
        : `<div class="req-meta"><span>${esc(r.form_title||"Form")}</span></div>`)).join("")}</div>
    <div class="primary-row"><button class="btn lg" id="startBtn"></button></div>
  </div>`;
  const next=PHYS.findIndex(r=>!processed[r.id]);
  const btn=$("startBtn");
  if(next<0){ btn.textContent="See what you saved →"; btn.addEventListener("click", ()=>go(5)); }
  else { CURSOR=next; btn.textContent=`${next>0||Object.keys(processed).some(id=>PHYS.find(p=>p.id===id))?"Continue":"Start"} with ${PHYS[next].title} →`; btn.addEventListener("click", ()=>go(3)); }
  focusHeading();
}

// STEP 3 + 4
async function renderReview(){
  const req=PHYS[CURSOR]; currentReq=req;
  $("stage").innerHTML=`<div class="stagepanel"><div class="empty">Preparing ${esc(req.title)}…</div></div>`;
  let data;
  try{ data=await (await fetch("/api/office/prefill",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({request_id:req.id})})).json(); }
  catch(e){ $("stage").innerHTML=`<div class="stagepanel"><div class="empty">Couldn't reach the backend.</div></div>`; return; }
  if(data.status!=="ok"){ $("stage").innerHTML=`<div class="stagepanel"><div class="empty">${esc(data.message||"No form for this request.")}</div></div>`; return; }
  const f=data.form;
  const md=f.fields.filter(x=>x.needs_physician), auto=f.fields.filter(x=>!x.needs_physician);
  const fieldHtml=(fld)=>{
    const big=["functional_limitations","prognosis","work_capacity","school_capacity"].includes(fld.id);
    const fid=esc(fld.id);
    const ctl=big
      ? `<textarea id="f-${fid}" data-fid="${fid}" data-md="${fld.needs_physician?1:0}" placeholder="${fld.needs_physician?'Your clinical judgement…':''}">${esc(fld.value)}</textarea>`
      : `<input id="f-${fid}" type="text" data-fid="${fid}" data-md="${fld.needs_physician?1:0}" value="${esc(fld.value)}" placeholder="${fld.needs_physician?'Confirm from chart…':''}"/>`;
    const prov=fld.drafted
      ? `<div class="prov"><span class="conf draft-badge">AI draft — verify &amp; sign</span><span class="conf ${fld.confidence==='low'?'low':''}">${esc(fld.confidence)} confidence</span>${fld.evidence?`<span class="ev">from note: ${esc(fld.evidence)}</span>`:``}</div>`
      : fld.needs_physician
      ? `<div class="prov"><span class="md-hint">Requires your clinical judgement</span></div>`
      : `<div class="prov"><span class="conf ${fld.confidence==='low'?'low':''}">${esc(fld.confidence)} confidence</span>${fld.evidence?`<span class="ev">from note: ${esc(fld.evidence)}</span>`:``}</div>`;
    return `<div class="field ${fld.needs_physician?'md':'auto'}${fld.drafted?' drafted':''}"><label for="f-${fid}">${esc(fld.label)}</label>${ctl}${prov}</div>`;
  };
  const opts=Array.isArray(data.referral_options)?data.referral_options:[];
  const riskBadge=(r)=>{ const cls=r==="low"?"badge-green":r==="high"?"badge-red":"badge-amber"; return `<span class="badge ${cls}">${esc(r)}</span>`; };
  const refCard = opts.length>0 ? `<div class="ref-intel-card">
    <div class="ref-intel-header">
      <span class="ref-intel-title">Suggested specialists</span>
      <span class="ref-intel-sub">Loop matched ${opts.length} option(s) for this referral — click a row to pre-fill "Referred to"</span>
    </div>
    <table class="ref-table">
      <thead><tr><th>Specialist</th><th>Clinic</th><th>Accepts scope</th><th>Rejection risk</th></tr></thead>
      <tbody>${opts.map(o=>`<tr class="ref-row" title="${esc(o.notes)}" onclick="selectSpecialist('${esc(o.specialist_name).replace(/'/g,"\\'")}','${esc(o.clinic).replace(/'/g,"\\'")}')">
        <td>${esc(o.specialist_name)}</td>
        <td>${esc(o.clinic)}</td>
        <td>${o.accepts_scope?'<span class="badge badge-green">Yes</span>':'<span class="badge badge-amber">No</span>'}</td>
        <td>${riskBadge(o.rejection_risk)}</td>
      </tr>`).join("")}</tbody>
    </table>
  </div>` : "";
  $("stage").innerHTML=`<div class="stagepanel">
    ${refCard}
    <h2>${esc(f.title)}</h2>
    <p class="lead">${f.auto_filled} field(s) pre-filled from the chart · ${md.length} need your clinical judgement.</p>
    <div class="counter" id="counter" aria-live="polite"></div>
    <div class="grouplabel">Your input needed — ${md.length}</div>
    ${md.map(fieldHtml).join("")}
    <details class="fold"><summary>Pre-filled from the chart — ${auto.length} (expand to verify)</summary>${auto.map(fieldHtml).join("")}</details>
    <div id="formResult"></div>
    <div class="primary-row"><button class="btn lg" id="approveBtn" disabled></button></div>
  </div>`;
  $("stage").querySelectorAll('[data-md="1"]').forEach(el=>el.addEventListener("input", updateCounter));
  $("approveBtn").addEventListener("click", ()=>approveForm(req));
  updateCounter();
  focusHeading();
}
function selectSpecialist(name, clinic) {
  const inp = document.getElementById('f-referred_to');
  if (inp) { inp.value = name + ' — ' + clinic; inp.dispatchEvent(new Event('input')); }
  document.querySelectorAll('.ref-row').forEach(r => r.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}
function mdEls(){ return Array.from($("stage").querySelectorAll('[data-md="1"]')); }
function updateCounter(){
  const els=mdEls(); const filled=els.filter(e=>e.value.trim()).length, total=els.length, allDone=filled>=total;
  const c=$("counter"); c.className="counter"+(allDone?" alldone":""); c.innerHTML=`<b>${filled} of ${total}</b> clinical field${total===1?"":"s"} complete`;
  const btn=$("approveBtn");
  if(allDone){ btn.disabled=false; btn.textContent="Approve & generate →"; }
  else { btn.disabled=true; btn.textContent=`Complete ${total-filled} more field${(total-filled)===1?"":"s"} to approve`; }
}
async function approveForm(req){
  STEP=4; renderRail();
  const completed={}; $("stage").querySelectorAll("[data-fid]").forEach(el=>{ if(el.value.trim()) completed[el.dataset.fid]=el.value; });
  let res;
  try{ res=await (await fetch("/api/office/approve",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({request_id:req.id, completed_fields:completed})})).json(); }
  catch(e){ $("formResult").innerHTML=`<div class="empty">Couldn't reach the backend.</div>`; STEP=3; renderRail(); return; }
  if(res.status!=="ok"){ $("formResult").innerHTML=`<div class="empty">${esc(res.message||"Could not generate draft.")}</div>`; STEP=3; renderRail(); return; }
  const d=res.draft;
  if(!d.complete){
    STEP=3; renderRail();
    $("formResult").innerHTML=`<div class="result" role="alert"><div class="rt"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>Can't finish yet — ${esc((d.outstanding_fields||[]).join(", "))} still needs your clinical judgement. We never fill this for you.</div></div>`;
    const first=mdEls().find(e=>!e.value.trim()); if(first){ first.focus(); first.scrollIntoView({behavior:"smooth",block:"center"}); }
    return;
  }
  const task=res.follow_up_task; const lines=d.fields.map(x=>`${x.label}: ${x.value||"—"}`);
  artifacts.push({kind:"form", title:`${d.title} — draft ready for signature`,
    draft:`FORM — ${d.title}\n${"-".repeat(40)}\n${lines.join("\n")}`,
    task:`${task.title} · owner ${task.owner} · due ${task.due}`, written:res.written||null});
  processed[req.id]={category:req.category, route:req.route};
  const remaining=PHYS.filter(r=>!processed[r.id]);
  if(remaining.length){ go(2); } else { go(5); }
}

// STEP 5
async function renderPayoff(){
  const cleared=Object.keys(processed).length, total=QUEUE.length;
  const ledger=artifacts.map(a=>{
    if(a.kind==="form"){
      return `<div class="led-item"><div class="led-ico">📄</div><div class="led-body">
        <div class="led-title">${esc(a.title)}</div>
        <div class="led-sub">↳ Task created: ${esc(a.task)}</div>
        ${a.written?`<div class="led-sub">↪ Written to FHIR (${a.written.mode==='written'?'live':'mock'}): <span class="ev">${esc(a.written.task_location)}</span> <span class="ev">${esc(a.written.questionnaire_response_location)}</span></div>`:""}
        <details class="fold" style="margin-top:8px"><summary>View draft</summary><pre>${esc(a.draft)}</pre></details>
      </div></div>`;
    }
    return `<div class="led-item"><div class="led-ico" style="background:var(--surface-2);color:var(--teal)">✓</div><div class="led-body"><div class="led-title">${esc(a.title)}</div><div class="led-sub">${esc(a.sub)}</div></div></div>`;
  }).join("");
  $("stage").innerHTML=`<div class="stagepanel">
    <div class="payoff-head">You cleared ${cleared} of ${total} requests.</div>
    <p class="lead">Here's what the assistant produced — and what it kept off your desk.</p>
    <div class="metrics">
      <div class="metric accent"><div class="num" id="mMin">0</div><div class="lbl">minutes saved this session</div></div>
      <div class="metric"><div class="num" id="mTouch">0</div><div class="lbl">physician touchpoints avoided</div></div>
      <div class="metric"><div class="num" id="mHours">0</div><div class="lbl">projected hrs/yr per physician</div></div>
      <div class="metric"><div class="num" id="mFte">0</div><div class="lbl">projected FTE per 100 physicians</div></div>
    </div>
    <div class="ledger">${ledger}</div>
    <div class="vs-comparison">
      <div class="vs-title">What Loop did vs the inbox manager</div>
      <table class="vs-table">
        <tr><th>Inbox manager</th><th>Loop</th></tr>
        <tr>
          <td>Routed documents · Flagged urgent · Assigned to physician</td>
          <td>Generated draft · Pre-filled form from chart · Created follow-up task · Wrote to FHIR · Cleared items from your desk</td>
        </tr>
      </table>
    </div>
    <div class="payoff-foot">Every draft and task above is real output your staff can act on now.</div>
  </div>`;
  // Single source of truth: the backend aggregates the same processed list. Don't
  // re-sum client-side (the request-id lookup is type-fragile and diverged from the headline).
  let proj={}; try{ proj=await (await fetch("/api/office/metrics",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({processed:Object.values(processed)})})).json(); }catch(e){}
  animateNum("mMin",proj.minutes_saved_now||0); animateNum("mTouch",proj.physician_touchpoints_avoided||0);
  animateNum("mHours",proj.projected_annual_hours_per_physician||0); animateNum("mFte",proj.projected_fte_per_100_physicians||0);
  focusHeading();
  // demo handoff banner
  if (new URLSearchParams(location.search).get('demo') === 'jordan') {
    setTimeout(() => {
      const stage = document.getElementById('stage');
      if (!stage || stage.querySelector('.demo-next')) return;
      const banner = document.createElement('div');
      banner.className = 'demo-next';
      banner.innerHTML = `
        <span class="demo-next-text">✓ Jordan's requests cleared. Next: see Jordan's pre-visit board before the follow-up appointment.</span>
        <a class="demo-next-link" href="/board?demo=jordan">Context Board →</a>`;
      stage.appendChild(banner);
    }, 300);
  }
}
function animateNum(id,target){
  const el=$(id); if(!el) return; const isF=!Number.isInteger(target); let start=null;
  const step=(ts)=>{ if(start===null)start=ts; const p=Math.min(1,(ts-start)/700); const v=target*p;
    el.textContent=isF?v.toFixed(1):String(Math.round(v)); if(p<1) requestAnimationFrame(step); else el.textContent=String(target); };
  requestAnimationFrame(step);
}

// Demo mode — auto-play Jordan Sample's case
(function initDemoMode() {
  const params = new URLSearchParams(location.search);
  if (params.get('demo') !== 'jordan') return;

  // inject context bar at the top of <main> (or just below <header>)
  const bar = document.createElement('div');
  bar.className = 'demo-ctx';
  bar.innerHTML = '<span class="demo-ctx-label">Demo:</span> Continuing Jordan Sample\'s case — processing waiting admin requests';
  const main = document.querySelector('main') || document.body;
  main.insertBefore(bar, main.firstChild);

  // the wizard's own init() already calls go(1) once the queue loads; re-assert step 1
  setTimeout(() => {
    if (typeof go === 'function') go(1);
    else if (typeof renderTriage === 'function') renderTriage();
  }, 400);
})();
</script>
